version: '3.8'

services:
  postgres-database:
    image: postgres:16.3
    container_name: postgres-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - main-network

  compiler:
    container_name: compiler
    build:
      context: .
      dockerfile: ./local-infra/containers/Dockerfile.compiler
    environment:
      - CONFIGURATION=Release
      - EXECUTABLE_NAME=PetEntityFrameworkProject
    volumes:
      - .:/source

  runtime:
    container_name: runtime
    build:
      context: .
      dockerfile: ./local-infra/containers/Dockerfile.runtime
    environment:
      - CONFIGURATION=Release
      - EXECUTABLE_NAME=PetEntityFrameworkProject
    volumes:
      - .:/app
    ports:
      - "5000:8080"
    networks:
      - main-network

  sdk:
    container_name: sdk
    build:
      context: .
      dockerfile: ./local-infra/containers/Dockerfile.sdk
    volumes:
      - .:/app

volumes:
  postgres-data:
  latest-build:

networks:
  main-network:
    driver: bridge